name: Bug Report
description: Report a problem with the OTOI framework
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! This helps us improve the OTOI framework for everyone.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Please describe the problem you encountered
      placeholder: Tell us what you see! Be as specific as possible.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      multiple: true
      options:
        - Documentation
        - JSON Schemas
        - Templates
        - Examples
        - GitHub Repository Setup
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Tell us what you expected instead
      placeholder: Describe the expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here
      placeholder: Screenshots, error messages, environment details, etc.
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact Level
      description: How much does this bug affect you?
      options:
        - Low - Minor inconvenience
        - Medium - Affects usability
        - High - Prevents intended use
        - Critical - Breaks core functionality
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true