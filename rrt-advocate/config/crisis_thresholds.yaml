# RRT Advocate Crisis Detection Configuration
# Crisis thresholds and detection parameters

crisis_thresholds:
  stress_level: 0.7
  panic_symptoms: 0.8
  overwhelm: 0.6
  isolation: 0.5
  suicidal_thoughts: 0.9
  substance_abuse: 0.7
  sleep_disturbance: 0.6
  appetite_change: 0.5

intervention_settings:
  auto_deploy: true
  escalation_timeout: 300  # seconds
  max_concurrent_interventions: 3
  follow_up_interval: 3600  # seconds

monitoring:
  assessment_interval: 1  # seconds
  pattern_analysis_interval: 300  # seconds
  health_check_interval: 60  # seconds

emergency_protocols:
  external_contact_threshold: "red"
  emergency_contacts:
    - name: "Emergency Services"
      number: "911"
      type: "emergency"
    - name: "Crisis Hotline"
      number: "988"
      type: "crisis"

privacy:
  data_retention_days: 30
  anonymize_patterns: true
  local_processing_only: true