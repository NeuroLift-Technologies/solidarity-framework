# NeuroLift Foundation Configuration
# Universal configuration file for the AI-fusion platform
# Evolved from neurodivergent support to universal foundation

# Foundation settings
foundation:
  version: "1.0.0"
  mode: "unified"  # unified, crisis_only, voice_only, framework_only
  debug: false
  domain: "universal"  # healthcare, education, workplace, mental_health, aging_care, custom
  evolution_stage: "universal"  # neurodivergent_focused -> universal_foundation

# Universal component configuration
components:
  rrt_advocate:
    enabled: true
    config_path: "rrt-advocate/config/crisis_thresholds.yaml"
    monitoring_interval: 1  # seconds
    domain_adaptable: true  # Can adapt to any domain's support needs
    intervention_types: ["crisis", "health_concern", "learning_difficulty", "work_stress", "custom"]
    
  toi_otoi_framework:
    enabled: true
    learning_enabled: true
    optimization_interval: 300  # seconds
    universal_learning: true  # Learns from any domain
    adaptation_speed: "moderate"  # How quickly to adapt to new domains
    
  voice_interface:
    enabled: true
    stress_detection: true
    response_style: "supportive"
    multi_modal: true  # Supports text, voice, and other modalities
    domain_aware: true  # Adapts language and responses to domain context
    
  supervisor_ai:
    enabled: true
    coordination_interval: 30  # seconds
    multi_domain: true  # Can coordinate across multiple domains
    adaptive_routing: true  # Routes requests based on domain context

# Privacy and security settings
privacy:
  data_encryption: true
  local_processing: true
  external_sharing: false
  data_retention_days: 30
  
security:
  access_control: true
  audit_logging: true
  input_validation: true

# Performance settings
performance:
  max_response_time: 5.0  # seconds
  cache_enabled: true
  background_optimization: true
  max_concurrent_interactions: 10

# Logging configuration
logging:
  level: "INFO"
  file: "logs/neurolift_foundation.log"
  max_size: "10MB"
  backup_count: 5