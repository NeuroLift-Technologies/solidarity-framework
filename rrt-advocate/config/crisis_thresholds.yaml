# RRT Advocate Universal Support Configuration
# Universal thresholds and detection parameters for any domain
# Evolved from ADHD-specific crisis detection to universal support system

# Universal support thresholds (adaptable to any domain)
support_thresholds:
  # Health & Wellness Domain
  health_concern: 0.7
  medication_reminder: 0.6
  vital_signs_alert: 0.8
  
  # Education & Learning Domain  
  learning_difficulty: 0.6
  attention_deficit: 0.7
  comprehension_struggle: 0.5
  
  # Workplace & Productivity Domain
  work_stress: 0.7
  deadline_pressure: 0.8
  burnout_indicators: 0.6
  
  # Mental Health Domain (original ADHD focus)
  stress_level: 0.7
  panic_symptoms: 0.8
  overwhelm: 0.6
  isolation: 0.5
  suicidal_thoughts: 0.9
  substance_abuse: 0.7
  sleep_disturbance: 0.6
  appetite_change: 0.5
  
  # Aging Care Domain
  mobility_concern: 0.7
  memory_issue: 0.6
  social_isolation: 0.5
  
  # Custom Domain (configurable)
  custom_indicators: {}

# Universal intervention settings (adaptable to any domain)
intervention_settings:
  auto_deploy: true
  escalation_timeout: 300  # seconds
  max_concurrent_interventions: 3
  follow_up_interval: 3600  # seconds
  domain_adaptive: true  # Adapts intervention strategies to domain context

# Universal monitoring (works across all domains)
monitoring:
  assessment_interval: 1  # seconds
  pattern_analysis_interval: 300  # seconds
  health_check_interval: 60  # seconds
  multi_domain_tracking: true  # Tracks patterns across different domains

# Universal emergency/support protocols
support_protocols:
  # Healthcare Domain
  health_emergency_threshold: "critical"
  health_contacts:
    - name: "Emergency Services"
      number: "911"
      type: "emergency"
    - name: "Primary Care Provider"
      number: "user_configured"
      type: "healthcare"
  
  # Education Domain
  learning_support_threshold: "moderate"
  education_contacts:
    - name: "Learning Support"
      number: "user_configured"
      type: "education"
    - name: "Tutor Services"
      number: "user_configured"
      type: "education"
  
  # Workplace Domain
  work_stress_threshold: "high"
  workplace_contacts:
    - name: "HR Support"
      number: "user_configured"
      type: "workplace"
    - name: "Employee Assistance"
      number: "user_configured"
      type: "workplace"
  
  # Mental Health Domain (original)
  crisis_threshold: "red"
  mental_health_contacts:
    - name: "Crisis Hotline"
      number: "988"
      type: "crisis"
    - name: "Therapist"
      number: "user_configured"
      type: "mental_health"

privacy:
  data_retention_days: 30
  anonymize_patterns: true
  local_processing_only: true